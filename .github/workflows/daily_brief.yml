name: 每日科技简报

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行简报生成
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUTF8: "1"
        run: python main.py

      - name: 提交并推送简报文件
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/briefs/ data/raw/
          # 只在有新文件时才提交
          git diff --staged --quiet || git commit -m "自动更新：$(date '+%Y-%m-%d') 科技简报"
          git push
